name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up prek and run hooks
        uses: j178/prek-action@v2.0.4
        with:
          prek-version: "0.4.3"

  test:
    name: Run tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install uv and set up environment
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run tests
        run: uv run pytest -vv

  notebooks:
    name: Execute example notebooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install uv and set up environment
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Execute notebooks
        working-directory: examples
        run: |
          for nb in *.ipynb; do
            uv run papermill "$nb" "executed_$nb" --log-output --progress-bar --log-level INFO
          done

      - name: Upload executed notebooks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebooks
          path: examples/executed_*.ipynb
