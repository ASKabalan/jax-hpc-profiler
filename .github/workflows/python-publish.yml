# Build with uv and publish to PyPI via OIDC trusted publishing.
# The trusted-publisher entry on PyPI is bound to this workflow filename
# (python-publish.yml) and the `pypi` environment below — keep both stable.
name: Upload Python Package

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish package to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
